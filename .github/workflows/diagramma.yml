name: Generate Project Diagram
on: 
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Create Docs Folder
        run: mkdir -p docs

      # Usiamo un tool alternativo e stabile per generare il file .mmd dal codice Java
      - name: Generate Mermaid Code
        run: |
          echo "classDiagram" > docs/diagramma.mmd
          # Questo comando cerca tutte le classi Java e crea una lista semplice
          find src/main/java -name "*.java" -exec basename {} .java \; | while read line; do
            echo "    class $line" >> docs/diagramma.mmd
          done

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagramma.mmd
          git commit -m "docs: aggiornamento automatico diagramma" || exit 0
          git push
